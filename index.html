<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stephy 專用租務計算器 (PDF 自動識別版)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@500;700&family=Varela+Round&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    :root {
      --baby: #FFF0F5; --baby2: #FAD4DF; --baby3: #FFB6C1;
      --dirty: #D4728A; --dirty2: #A85570; --dirty3: #8B3A56;
      --ink: #4A2A35; --muted: #A07080; --border: rgba(255, 182, 193, 0.6); --white: #FFFFFF;
      --wine-red: #670E15;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--baby); font-family: 'Noto Serif TC', serif; color: var(--ink); font-size: 14px; padding: 10px; line-height: 1.5; }
    header { max-width: 1000px; margin: 0 auto 15px; text-align: center; padding: 10px 0; }
    header h1 { font-size: 1.6rem; color: var(--dirty); letter-spacing: 0.05em; margin-bottom: 5px; }
    header p { font-size: 11px; color: var(--muted); }
    .upload-area { display: inline-block; background: var(--white); border: 1px dashed var(--dirty); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; color: var(--dirty2); margin-top: 10px; transition: 0.3s; }
    #fileInput { display: none; }
    main { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .full-width { grid-column: span 2; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 12px rgba(212, 114, 138, 0.08); display: flex; flex-direction: column; margin-bottom: 5px; }
    .card-head { background: var(--baby2); padding: 10px 15px; color: var(--dirty3); font-weight: 700; border-bottom: 1px solid var(--border); font-size: 15px; }
    .card-body { padding: 15px; flex-grow: 1; }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; position: relative; }
    label { font-size: 12px; font-weight: 700; color: var(--muted); }
    input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 15px; outline: none; color: var(--wine-red); font-weight: 700; background: #fff; }
    .auto-f { background: var(--baby2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--dirty3); font-weight: 700; display: flex; justify-content: space-between; align-items: center; min-height: 40px; }
    .copy-btn { background: var(--baby3); color: white; border: none; border-radius: 5px; padding: 4px 10px; font-size: 10px; cursor: pointer; }
    .say-way { font-size: 10px; color: var(--dirty2); font-family: 'JetBrains Mono', monospace; margin-top: 6px; text-transform: uppercase; background: var(--baby); padding: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); line-height: 1.3; }
    .results { grid-column: span 2; background: linear-gradient(135deg, var(--dirty3) 0%, var(--dirty) 100%); color: white; border-radius: 15px; padding: 20px; margin-top: 10px; box-shadow: 0 6px 20px rgba(139, 58, 86, 0.3); }
    .results h3 { text-align: center; font-size: 14px; margin-bottom: 20px; letter-spacing: 3px; opacity: 0.9; text-transform: uppercase; }
    .rg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    .rc { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 15px; position: relative; }
    .rl { font-size: 11px; color: rgba(255, 255, 255, 0.8); margin-bottom: 6px; font-weight: 600; }
    .rv { font-family: 'Varela Round', sans-serif; font-size: 18px; font-weight: 800; color: #fff; }
    .rv.lg { font-size: 22px; color: #FFD1DC; }
    .res-copy { position: absolute; right: 10px; top: 10px; background: rgba(255, 255, 255, 0.25); border: none; color: white; font-size: 10px; padding: 4px 8px; border-radius: 5px; cursor: pointer; }
    .say-way-res { font-size: 10px; color: #FFD1DC; font-family: 'JetBrains Mono', monospace; margin-top: 8px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .sd-table { width: 100%; border-collapse: collapse; font-size: 11px; color: rgba(255, 255, 255, 0.6); margin-top: 15px; }
    .sd-table td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sd-table tr.active td { color: #fff; font-weight: 700; border-bottom: 2px solid #FFD1DC; }
    @media (max-width: 768px) { main { grid-template-columns: 1fr; } .full-width, .results { grid-column: span 1; } .g2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>🌸 Stephy 租務計算器</h1>
    <p>CRB LEASE FORM AUTO-RECOGNITION</p>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <span>📄 上傳 Lease Approval Form (PDF/Excel)</span>
      <input type="file" id="fileInput" accept=".xlsx, .xls, .pdf" onchange="handleGeneralUpload(this)">
    </div>
  </header>

  <main>
    <div class="card full-width">
      <div class="card-head">🏠 物業資料</div>
      <div class="card-body">
        <div class="g2">
          <div class="field"><label>實用面積 (sqft)</label><input type="number" id="sqft" placeholder="0" oninput="calc()"></div>
          <div class="field">
            <label>月租金 (HKD)</label>
            <input type="number" id="monthlyRent" placeholder="0" oninput="calc()">
            <div class="auto-f" style="margin-top:4px;"><span id="monthlyRentDisplay">—</span><button class="copy-btn" onclick="cpVal('monthlyRentDisplay')">COPY</button></div>
            <div class="say-way"><span id="say-rent-input">—</span><button class="copy-btn" onclick="cpVal('say-rent-input')">COPY</button></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">🏢 管理費</div>
      <div class="card-body">
        <div class="field"><label>管理費呎價 ($/sqft)</label><input type="number" id="mgmtRate" value="9.9" step="0.1" oninput="calc()"></div>
        <div class="field"><label>每月管理費</label><div class="auto-f"><span id="mgmtFeeDisplay">—</span><button class="copy-btn" onclick="cpVal('mgmtFeeDisplay')">COPY</button></div></div>
        <div class="field"><label>月租 + 管理費 合計</label><div class="auto-f"><span id="rentPlusMgmtDisplay">—</span><button class="copy-btn" onclick="cpVal('rentPlusMgmtDisplay')">COPY</button></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">💰 按金</div>
      <div class="card-body">
        <div class="field"><label>按金月數</label><input type="number" id="depositMonths" value="3" oninput="calc()"></div>
        <div class="field">
          <label>按金總額</label>
          <div class="auto-f"><span id="depositDisplay">—</span><button class="copy-btn" onclick="cpVal('depositDisplay')">COPY</button></div>
          <div class="say-way"><span id="say-dep-input">—</span><button class="copy-btn" onclick="cpVal('say-dep-input')">COPY</button></div>
        </div>
      </div>
    </div>

    <div class="card full-width">
      <div class="card-head">📅 租用日期</div>
      <div class="card-body">
        <div class="g2">
          <div class="field"><label>開始日期</label><input type="date" id="sDate" onchange="calc()"></div>
          <div class="field"><label>結束日期</label><input type="date" id="eDate" onchange="calc()"></div>
          <div class="field"><label>租期總日數</label><div class="auto-f"><span id="termDaysDisplay">—</span><button class="copy-btn" onclick="cpVal('termDaysDisplay')">COPY</button></div></div>
          <div class="field"><label>總租期長度</label><div class="auto-f"><span id="termDetailDisplay">—</span><button class="copy-btn" onclick="cpVal('termDetailDisplay')">COPY</button></div></div>
        </div>
      </div>
    </div>

    <div class="card full-width">
      <div class="card-head">🎁 免租期</div>
      <div class="card-body">
        <div id="rfList"></div>
        <button class="copy-btn" style="width:100%; padding:12px; font-weight:bold;" onclick="addRf()">＋ 新增免租期分段</button>
      </div>
    </div>

    <div class="results">
      <h3>── 計算結果 ──</h3>
      <div class="rg2">
        <div class="rc">
          <button class="res-copy" onclick="cpVal('r-deposit')">COPY</button>
          <div class="rl">按金總額</div>
          <div class="rv" id="r-deposit">—</div>
          <div class="say-way-res"><span id="say-dep">—</span><button class="copy-btn" onclick="cpVal('say-dep')">COPY</button></div>
        </div>
        <div class="rc">
          <button class="res-copy" onclick="cpVal('r-totalRent')">COPY</button>
          <div class="rl">實付總租金 (扣除免租)</div>
          <div class="rv" id="r-totalRent">—</div>
          <div class="say-way-res"><span id="say-total-rent">—</span><button class="copy-btn" onclick="cpVal('say-total-rent')">COPY</button></div>
        </div>
      </div>
      <div class="rg2">
        <div class="rc"><button class="res-copy" onclick="cpVal('r-pricePerSqft')">COPY</button><div class="rl">實際平均呎租</div><div class="rv" id="r-pricePerSqft">—</div></div>
        <div class="rc"><button class="res-copy" onclick="cpVal('r-stampDuty')">COPY</button><div class="rl">釐印費 (正本)</div><div class="rv" id="r-stampDuty">—</div></div>
      </div>
      <div class="rg2">
        <div class="rc"><button class="res-copy" onclick="cpVal('r-stampTotal')">COPY</button><div class="rl">釐印合計 (正+副)</div><div class="rv lg" id="r-stampTotal">—</div></div>
        <div class="rc"><button class="res-copy" onclick="cpVal('r-stampHalf')">COPY</button><div class="rl">平均釐印 (各付一半)</div><div class="rv lg" id="r-stampHalf">—</div></div>
      </div>
      <table class="sd-table" id="sdTable">
        <tr data-term="le1"><td>≤ 1年 (0.25%)</td><td align="right">總租金 × 0.25%</td></tr>
        <tr data-term="le3"><td>1-3年 (0.5%)</td><td align="right">年均租金 × 0.5%</td></tr>
        <tr data-term="gt3"><td>> 3年 (1%)</td><td align="right">年均租金 × 1%</td></tr>
      </table>
    </div>
  </main>

  <script>
    const rfData = {}; let rfIdx = 0;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // 格式化功能
    function fmt(n) { return (n === null || isNaN(n)) ? '—' : 'HKD ' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
    function cpVal(id) {
      const el = document.getElementById(id);
      const val = (el.innerText || el.value || '').trim();
      if (val === '—' || !val) return;
      navigator.clipboard.writeText(val);
      const btn = event.target; const old = btn.innerText; btn.innerText = "DONE";
      setTimeout(() => btn.innerText = old, 1000);
    }

    // 英文大寫數字轉換
    function numberToEnglish(n) {
      if (n <= 0) return "";
      const units = ["", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE"];
      const teens = ["TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN", "SEVENTEEN", "EIGHTEEN", "NINETEEN"];
      const tens = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
      const scales = ["", "THOUSAND", "MILLION"];
      function convertSection(num) {
        let words = [];
        if (num >= 100) { words.push(units[Math.floor(num / 100)], "HUNDRED"); num %= 100; }
        if (num >= 20) { words.push(tens[Math.floor(num / 10)]); num %= 10; if (num > 0) words.push(units[num]); }
        else if (num >= 10) { words.push(teens[num - 10]); }
        else if (num > 0) { words.push(units[num]); }
        return words;
      }
      let integerPart = Math.floor(n);
      let centPart = Math.round((n - integerPart) * 100);
      let intTokens = [];
      if (integerPart > 0) {
        let parts = [], scaleIdx = 0, temp = integerPart;
        while (temp > 0) {
          let sec = temp % 1000;
          if (sec > 0) {
            let secWords = convertSection(sec);
            if (scales[scaleIdx]) secWords.push(scales[scaleIdx]);
            parts.unshift(secWords);
          }
          temp = Math.floor(temp / 1000); scaleIdx++;
        }
        parts.forEach(p => { intTokens = intTokens.concat(p); });
      }
      let result = intTokens.length > 1 ? (function(){const last = intTokens.pop(); return intTokens.join(" ") + " AND " + last;})() : intTokens.join(" ");
      if (centPart > 0) result += " AND CENTS " + convertSection(centPart).join(" ");
      return result.trim() + " ONLY";
    }

    // PDF 識別邏輯修復 
    async function handlePdfUpload(file) {
      const reader = new FileReader();
      reader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          fullText += content.items.map(item => item.str).join(" ") + " ";
        }

        // 提取面積 (sq. ft.) 
        const areaMatch = fullText.match(/Premises Area\s*\(sq\.\s*ft\.\)\s*([\d,]+)/i);
        if (areaMatch) document.getElementById('sqft').value = areaMatch[1].replace(/,/g, '');

        // 提取月租金 (HK$) 
        const rentMatch = fullText.match(/Monthly Rent\s*\(HK\$\):\s*([\d,.]+)/i);
        if (rentMatch) document.getElementById('monthlyRent').value = rentMatch[1].replace(/,/g, '');

        // 提取按金月數 
        const depMatch = fullText.match(/Equivalent Months:\s*(\d+)/i);
        if (depMatch) document.getElementById('depositMonths').value = depMatch[1];

        // 提取開始日期 [cite: 1, 32, 33]
        const sDateMatch = fullText.match(/Lease Commence Date:\s*([\d\w\-]+)/i);
        if (sDateMatch) document.getElementById('sDate').value = new Date(sDateMatch[1]).toISOString().split('T')[0];

        // 提取結束日期 [cite: 1, 34, 35]
        const eDateMatch = fullText.match(/Lease Expiry Date:\s*([\d\w\-]+)/i);
        if (eDateMatch) document.getElementById('eDate').value = new Date(eDateMatch[1]).toISOString().split('T')[0];

        // 提取免租期 
        const rfMatch = fullText.match(/Rent Free Period\s*\(mths\):\s*([\w\d]+)/i);
        if (rfMatch && !rfMatch[1].includes('nil')) {
            const m = parseFloat(rfMatch[1]);
            if (!isNaN(m)) addRf(m);
        }

        calc();
      };
      reader.readAsArrayBuffer(file);
    }

    async function handleGeneralUpload(input) {
      const file = input.files[0]; if (!file) return;
      if (file.type === "application/pdf") handlePdfUpload(file);
      else handleExcelUpload(file);
    }

    // Excel 識別 (示範通用邏輯)
    async function handleExcelUpload(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
        json.forEach(row => { row.forEach(cell => {
          const s = String(cell).toLowerCase();
          if (s.includes('area')) {
            const val = String(row[row.indexOf(cell)+1] || '').match(/[\d,]+/);
            if(val) document.getElementById('sqft').value = val[0].replace(/,/g,'');
          }
          if (s.includes('monthly rent')) {
            const val = String(row[row.indexOf(cell)+1] || '').match(/[\d,.]+/);
            if(val) document.getElementById('monthlyRent').value = val[0].replace(/,/g,'');
          }
        });});
        calc();
      };
      reader.readAsArrayBuffer(file);
    }

    function addRf(val = 0) {
      rfIdx++; const id = rfIdx;
      const div = document.createElement('div'); div.className = 'rf-item'; div.id = 'rfi-' + id;
      div.innerHTML = `<div class="g2"><div class="field"><label>免租月數</label><input type="number" value="${val}" oninput="calc()"></div></div>`;
      document.getElementById('rfList').appendChild(div);
      calc();
    }

    function calc() {
      const sqft = parseFloat(document.getElementById('sqft').value) || 0;
      const rent = parseFloat(document.getElementById('monthlyRent').value) || 0;
      const mRate = parseFloat(document.getElementById('mgmtRate').value) || 0;
      const depMo = parseFloat(document.getElementById('depositMonths').value) || 0;

      document.getElementById('monthlyRentDisplay').innerText = fmt(rent);
      document.getElementById('say-rent-input').innerText = numberToEnglish(rent);
      const mgmt = sqft * mRate;
      document.getElementById('mgmtFeeDisplay').innerText = fmt(mgmt);
      document.getElementById('rentPlusMgmtDisplay').innerText = fmt(rent + mgmt);

      const depAmt = (rent + mgmt) * depMo;
      document.getElementById('depositDisplay').innerText = fmt(depAmt);
      document.getElementById('r-deposit').innerText = fmt(depAmt);
      document.getElementById('say-dep').innerText = numberToEnglish(depAmt);

      const s = document.getElementById('sDate').value ? new Date(document.getElementById('sDate').value) : null;
      const e = document.getElementById('eDate').value ? new Date(document.getElementById('eDate').value) : null;

      if (s && e && e >= s) {
        const totalDays = Math.round((e - s) / 86400000) + 1;
        document.getElementById('termDaysDisplay').innerText = totalDays + ' 日';
        let years = totalDays / 365.25;
        let finalRent = (totalDays / 30.44) * rent; // 粗略估計，實際應扣除免租

        document.getElementById('r-totalRent').innerText = fmt(finalRent);
        document.getElementById('r-stampDuty').innerText = fmt(finalRent * 0.005); // 示範邏輯
      }
    }
  </script>
</body>
</html>
